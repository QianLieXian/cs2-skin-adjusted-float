<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS2 炼金磨损匹配器</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <h1>CS2 反向炼金磨损匹配器</h1>
    <p class="muted">支持 9-16 位小数目标磨损，按库存反推可达/近似方案；饰品按稀有度着色并展示 收藏品 / 稀有度 / 饰品 书签路径。</p>

    <section class="card">
      <h2>1) Steam 库存授权与读取</h2>
      <div class="row">
        <button id="steamLoginBtn">Steam 登录（需后端）</button>
        <button id="refreshInventoryBtn" class="secondary">刷新已登录库存</button>
        <button id="loadDemoBtn" class="secondary">加载示例库存</button>
        <button id="exportLogsBtn" class="secondary">导出后端日志</button>
      </div>
      <div class="trade-url-box">
        <label for="tradeUrlInput">无需登录：输入你的交易链接（Trade Offer URL）读取公开库存</label>
        <input id="tradeUrlInput" type="text" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=...&token=..." />
        <button id="loadByTradeUrlBtn" class="secondary">通过交易链接读取库存</button>
      </div>
      <div class="api-key-box">
        <label for="steamApiKeyInput">可选：填写 Steam Web API Key（优先用于后端库存接口）</label>
        <input id="steamApiKeyInput" type="password" placeholder="例如：XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX" autocomplete="off" />
        <div class="grid-3 api-direct-grid">
          <div>
            <label for="steamIdInput">SteamID64（17 位）</label>
            <input id="steamIdInput" type="text" placeholder="例如：7656119xxxxxxxxxx" autocomplete="off" />
          </div>
          <div class="api-direct-action">
            <button id="loadByApiKeyBtn" class="secondary">通过 API Key 直接读取库存</button>
          </div>
        </div>
        <p class="muted small">不会提交到第三方，仅随本工具请求发送到你当前部署的后端。<a href="https://steamcommunity.com/dev/apikey" target="_blank" rel="noreferrer noopener">如何获取我的 API Key？</a></p>
      </div>
      <div class="import-box">
        <label for="inventoryImportFile">离线导入：选择由油猴脚本/浏览器插件导出的库存 JS 文件</label>
        <div class="row">
          <input id="inventoryImportFile" type="file" accept=".js,.json,application/json,text/javascript" />
          <button id="importInventoryBtn" class="secondary">导入本地库存文件</button>
        </div>
        <p class="muted small">建议从 Steam 个人库存页面导出，能补充 7 天冷却状态及更多磨损信息。</p>
      </div>
      <pre id="authStatus">未登录</pre>
      <div id="inventoryMeta"></div>
    </section>

    <section class="card">
      <h2>2) 反向目标设置</h2>
      <div class="grid-3">
        <div>
          <label for="collectionSelect">收藏品</label>
          <select id="collectionSelect"></select>
        </div>
        <div>
          <label for="raritySelect">稀有度</label>
          <select id="raritySelect"></select>
        </div>
        <div>
          <label for="skinSelect">饰品</label>
          <select id="skinSelect"></select>
        </div>
      </div>
      <label for="targetFloat">目标磨损（9-16 位小数）</label>
      <input id="targetFloat" type="text" placeholder="例如：0.13989789148739" />
      <div class="row">
        <div>
          <label for="recipeCount">配方件数</label>
          <select id="recipeCount">
            <option value="10" selected>10 件</option>
            <option value="5">5 件</option>
          </select>
        </div>
      </div>
      <button id="calculateBtn">计算可达/近似方案</button>
      <div id="selectedSkinHint" class="tip"></div>
    </section>

    <section class="card">
      <h2>3) 计算结果</h2>
      <div id="result"></div>
    </section>

    <section class="card">
      <h2>数据范围</h2>
      <div id="dataSummary"></div>
    </section>
  </main>

  <script src="./script.js" type="module"></script>
</body>
</html>
